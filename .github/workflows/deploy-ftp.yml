name: Deploy to FTP on master push

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP with SQLite
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, sqlite3

      - name: Run unit tests
        run: php tests/run-tests.php

  deploy:
    runs-on: ubuntu-latest
    needs: test

    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP with SQLite
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_sqlite, sqlite3

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Copy vendor into web/
        run: |
          rm -rf ./web/vendor
          cp -R ./vendor ./web/vendor

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Write version file
        run: echo "${{ github.sha }}" > ./web/version

      - name: Upload update.notify (pre-update warning)
        run: |
          umask 022
          : > ./update.notify
          chmod 644 ./update.notify
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" << EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set ftp:ssl-allow false
          set ftp:passive-mode yes
          cd "$FTP_REMOTE_DIR"
          put ./update.notify -o update.notify
          chmod 644 update.notify
          bye
          EOF

      - name: Wait 5 minutes for open sessions to show warning
        run: sleep 300

      - name: Upload maintenance index.php and admin.php
        run: |
          mkdir -p ./deploy-maintenance
          cp ./.github/deploy/maintenance.php ./deploy-maintenance/index.php
          cp ./.github/deploy/maintenance.php ./deploy-maintenance/admin.php
          chmod 644 ./deploy-maintenance/index.php ./deploy-maintenance/admin.php
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" << EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set ftp:ssl-allow false
          set ftp:passive-mode yes
          cd "$FTP_REMOTE_DIR"
          mirror -R \
            --exclude-glob .htaccess \
            --exclude-glob cache/** \
            --exclude-glob data/** \
            --exclude-glob auth.php \
            ./deploy-maintenance .
          chmod 644 index.php
          chmod 644 admin.php
          bye
          EOF

      - name: Deploy web/ to FTP (with delete & excludes)
        run: |
          umask 022
          find ./web -type d -exec chmod 755 {} +
          find ./web -type f -exec chmod 644 {} +
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" << EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set ftp:ssl-allow false
          set ftp:passive-mode yes
          cd "$FTP_REMOTE_DIR"
          mirror -R --delete \
            --exclude-glob .htaccess \
            --exclude-glob cache/** \
            --exclude-glob data/** \
            --exclude-glob auth.php \
            --exclude-glob index.php \
            --exclude-glob admin.php \
            ./web .
          bye
          EOF

      - name: Deploy index.php and admin.php last
        run: |
          chmod 644 ./web/index.php ./web/admin.php
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_HOST" << EOF
          set cmd:fail-exit true
          set net:max-retries 2
          set net:timeout 20
          set ftp:ssl-allow false
          set ftp:passive-mode yes
          cd "$FTP_REMOTE_DIR"
          put ./web/index.php -o index.php
          put ./web/admin.php -o admin.php
          chmod 644 index.php
          chmod 644 admin.php
          bye
          EOF
